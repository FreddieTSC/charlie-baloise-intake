[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Offline standalone demo — force a clean download instead of rendering in-browser
[[headers]]
  for = "/charlie-demo-standalone.html"
  [headers.values]
    Content-Disposition = "attachment; filename=\"charlie-demo-standalone.html\""
